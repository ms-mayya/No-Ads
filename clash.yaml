port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
external-controller: ":9090"
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: rule
  fake-ip-filter:
    - DOMAIN-SUFFIX,lan,real-ip
    - DOMAIN-SUFFIX,local,real-ip
    - GEOSITE,private,real-ip
    - GEOSITE,cn,real-ip
    - GEOSITE,gfw,fake-ip
    - MATCH, fake-ip
  use-hosts: true
  nameserver:
    - tls://223.5.5.5:853
    - tls://223.6.6.6:853
    - 114.114.114.114
    - 119.29.29.29
    - 223.5.5.5
  nameserver-policy:
    "geosite:category-ads-all": rcode://success
  proxy-server-nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
    - tls://223.5.5.5:853
    - tls://223.6.6.6:853
    - 114.114.114.114
    - 119.29.29.29
    - 223.5.5.5

proxies:
  - name: 🇺🇸 34567
    server: your-server.com
    port: 34567
    ports: 34567/56789
    udp: true
    skip-cert-verify: false
    sni: bilibili.com
    type: hysteria2
    password: your-secure-password
    alpn:
      - h3
    tags: us
proxy-groups:
  - name: 🔰 节点选择
    type: select
    proxies:
      - ♻️ 自动选择
      - 🎯 全球直连
      - 🇺🇸 34567
  - name: ♻️ 自动选择
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 300
    proxies:
      - 🇺🇸 34567
  - name: ⛔️ 广告拦截
    type: select
    proxies:
      - 🛑 全球拦截
      - 🎯 全球直连
      - 🔰 节点选择
  - name: 🚫 运营劫持
    type: select
    proxies:
      - 🛑 全球拦截
      - 🎯 全球直连
      - 🔰 节点选择
  - name: 🎯 全球直连
    type: select
    proxies:
      - DIRECT
  - name: 🛑 全球拦截
    type: select
    proxies:
      - REJECT
      - DIRECT
  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - 🔰 节点选择
      - 🎯 全球直连
      - ♻️ 自动选择

rules:
  - GEOSITE,private,🎯 全球直连
  - GEOSITE,cn,🎯 全球直连
  - GEOSITE,geolocation-cn,🎯 全球直连

  - GEOIP,private,🎯 全球直连,no-resolve
  - GEOIP,CN,🎯 全球直连,no-resolve
  - MATCH,🐟 漏网之鱼
